{% load bike_extras %}
{% bike_photo_url bike as photo_url %}
<img
  src="{{ photo_url }}"
  alt="{{ bike.display_name }}"
  class="bike-photo img-fluid w-100 object-fit-cover{% if css_class %} {{ css_class }}{% endif %}"
  loading="{% if eager %}eager{% else %}lazy{% endif %}"
  decoding="async"
  {% if eager %}fetchpriority="high"{% endif %}
>
