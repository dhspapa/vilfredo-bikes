{% load i18n %}
{% if bike.image %}
  <img
    src="{{ bike.image.url }}"
    alt="{{ bike.display_name }}"
    class="bike-photo img-fluid w-100 object-fit-cover{% if css_class %} {{ css_class }}{% endif %}"
  >
{% else %}
  <div class="bike-photo-placeholder d-flex flex-column align-items-center justify-content-center text-center{% if css_class %} {{ css_class }}{% endif %}" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="mb-2 opacity-50" viewBox="0 0 16 16">
      <path d="M4 4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h1V4z"/>
    </svg>
    <span class="small text-muted">{% trans "Photo coming soon" %}</span>
  </div>
{% endif %}
